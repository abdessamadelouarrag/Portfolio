<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Adaptive Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/contact.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        dark: '#050505',
                        card: '#0f0f11',
                        primary: '#a855f7', // Purple-500
                        secondary: '#d8b4fe',
                    },
                }
            }
        }
    </script>
    
    <style>
        /* BURGER MENU STYLES (REQUIRED) */
        .burger-line {
            transition: all 0.3s ease-in-out;
        }
        #mobile-menu.is-active .line-top {
            transform: translateY(7px) rotate(45deg);
        }
        #mobile-menu.is-active .line-middle {
            opacity: 0;
        }
        #mobile-menu.is-active .line-bottom {
            transform: translateY(-7px) rotate(-45deg);
        }
    </style>
</head>

<body class="bg-dark text-white font-sans antialiased overflow-x-hidden selection:bg-primary selection:text-white">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-purple-900/15 blur-[150px] rounded-full pointer-events-none -z-10"></div>

    <!--part nav bar-->
    <div id="navbar-placeholder"></div>

    <section class="pt-40 pb-20 container mx-auto px-6 text-center reveal">
        <p class="text-primary text-sm font-medium tracking-widest uppercase mb-4">Let's Connect</p>
        <h1 class="text-5xl md:text-7xl font-semibold bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
            Get in Touch.
        </h1>
    </section>

   

    <section id="contact" class="reveal py-16">
    <div class="max-w-3xl mx-auto px-6">
        <h2 class="text-3xl font-bold mb-4">Contact Me</h2>
        <p class="text-gray-400 mb-8">
            Send me a message and I will get back to you as soon as possible.
        </p>

        <form id="contact-form" class="space-y-5">
            <!-- Honeypot field -->
            <input
                type="text"
                name="company"
                autocomplete="off"
                tabindex="-1"
                class="hidden"
                aria-hidden="true"
            >

            <div>
                <label for="name" class="block mb-2 text-sm font-medium">Name</label>
                <input
                    id="name"
                    name="name"
                    type="text"
                    required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none"
                    placeholder="Your name"
                >
            </div>

            <div>
                <label for="email" class="block mb-2 text-sm font-medium">Email</label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none"
                    placeholder="you@example.com"
                >
            </div>

            <div>
                <label for="subject" class="block mb-2 text-sm font-medium">Subject</label>
                <input
                    id="subject"
                    name="subject"
                    type="text"
                    required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none"
                    placeholder="Subject"
                >
            </div>

            <div>
                <label for="message" class="block mb-2 text-sm font-medium">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none"
                    placeholder="Write your message..."
                ></textarea>
            </div>

            <button
                id="contact-submit"
                type="submit"
                class="inline-flex items-center gap-2 rounded-xl bg-white text-black px-6 py-3 font-semibold transition disabled:opacity-60"
            >
                <span class="submit-label">Send Message</span>
                <span class="submit-icon">➜</span>
            </button>

            <p id="contact-status" class="mt-3 text-sm min-h-[1.25rem] text-left"></p>
        </form>
    </div>
</section>

<script src="/js/main.js"></script>

    <footer class="py-12 bg-black relative border-t border-white/5">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-2xl font-bold mb-8 underline decoration-purple-500/50 hover:decoration-purple-500 transition-all cursor-pointer">
                abdessamad.4804.com
            </h2>
            <div class="text-xs text-gray-500 flex flex-col md:flex-row justify-between items-center">
                <span>AE Design Agency</span>
                <span class="mt-2 md:mt-0">&copy; 2025 All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src="/js/script.js"></script>
    <script src="/js/contact.js"></script>
    <script src="/js/navbar.js"></script>
</body>
</html>
