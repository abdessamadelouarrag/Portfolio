services:
  - type: web
    runtime: node
    name: portfolio
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/test
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CONTACT_TO
        sync: false
